<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home — SHOWCASH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-header-text">
            <h2>Home</h2>
            <p>Manage and control your currency rates</p>
        </div>
        <a href="/add-currency" class="btn btn-gold">+ Add Currency</a>
    </div>

    <div class="card">
        <div id="error-msg" class="error-msg" style="display:none;"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Currency</th>
                        <th>Buying Rate</th>
                        <th>Selling Rate</th>
                        <th>Decimals</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="navbar.js"></script>
<script>
const CURRENCY_COUNTRY = {
    USD:"us",GBP:"gb",JPY:"jp",EUR:"eu",AUD:"au",SGD:"sg",HKD:"hk",
    CAD:"ca",CHF:"ch",NZD:"nz",TWD:"tw",KRW:"kr",INR:"in",THB:"th",
    CNY:"cn",IDR:"id",SAR:"sa",MYR:"my",PHP:"ph",VND:"vn",AED:"ae",
    BND:"bn",TRY:"tr",DKK:"dk",SEK:"se",NOK:"no",ZAR:"za",PKR:"pk",
    OMR:"om",JOD:"jo",BHD:"bh",EGP:"eg",QAR:"qa",KWD:"kw",LKR:"lk",
    BDT:"bd",MOP:"mo",SCR:"sc",IQD:"iq",RUB:"ru"
};

const errorMsg = document.getElementById("error-msg");
let editingId = null;
let allData = [];

function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = "block"; }
function hideError() { errorMsg.style.display = "none"; }

function flagImg(code) {
    const cc = CURRENCY_COUNTRY[code] || "un";
    return `<img class="flag-img" src="https://flagcdn.com/w40/${cc}.png" alt="${code}" onerror="this.style.display='none'">`;
}
function flagCell(code) {
    return `<div class="currency-cell">${flagImg(code)}<strong>${code}</strong></div>`;
}

async function loadCurrencies() {
    try {
        const res = await fetch("/api/currencies", { credentials: "include" });
        if (res.status === 401) { window.location.href = "/login"; return; }
        if (!res.ok) throw new Error();
        allData = await res.json();
        hideError();
        renderTable();
    } catch {
        showError("Could not load currencies. Please refresh.");
    }
}

function renderTable() {
    const tbody = document.getElementById("tableBody");
    if (allData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No currencies yet.</td></tr>`;
        return;
    }

    let rows = "";
    allData.forEach((c, i) => {
        if (editingId === c.id) {
            rows += `
            <tr class="edit-row">
                <td>${i + 1}</td>
                <td>${flagCell(c.currency)}</td>
                <td><input class="input" id="e-buying" type="number" value="${c.buyingRate}" step="any" min="0"></td>
                <td><input class="input" id="e-selling" type="number" value="${c.sellingRate}" step="any" min="0"></td>
                <td>
                    <select id="e-decimals" class="input" style="min-width:65px;">
                        ${[0,1,2,3,4].map(d=>`<option value="${d}" ${c.decimals===d?'selected':''}>${d}</option>`).join('')}
                    </select>
                </td>
                <td><span class="${c.active?'badge-on':'badge-off'}">${c.active?'ON':'OFF'}</span></td>
                <td>
                    <div class="actions-cell">
                        <button class="btn btn-primary btn-xs" onclick="saveEdit(${c.id},'${c.currency}',${c.unit})">Save</button>
                        <button class="btn btn-secondary btn-xs" onclick="cancelEdit()">Cancel</button>
                    </div>
                </td>
            </tr>`;
        } else {
            rows += `
            <tr>
                <td>${i + 1}</td>
                <td>${flagCell(c.currency)}</td>
                <td>${c.buyingRate.toFixed(c.decimals)}</td>
                <td>${c.sellingRate.toFixed(c.decimals)}</td>
                <td>${c.decimals}</td>
                <td><span class="${c.active?'badge-on':'badge-off'}">${c.active?'ON':'OFF'}</span></td>
                <td>
                    <div class="actions-cell">
                        <button class="btn btn-secondary btn-xs" onclick="startEdit(${c.id})">Edit</button>
                        <button class="btn btn-xs toggle-btn ${c.active?'on':'off'}" onclick="toggleCurrency(${c.id})">${c.active?'Turn OFF':'Turn ON'}</button>
                        <button class="btn btn-danger btn-xs" onclick="deleteCurrency(${c.id})">Delete</button>
                    </div>
                </td>
            </tr>`;
        }
    });
    tbody.innerHTML = rows;
}

function startEdit(id) { editingId = id; renderTable(); }
function cancelEdit()  { editingId = null; renderTable(); }

async function saveEdit(id, currency, unit) {
    const buyingRate  = parseFloat(document.getElementById("e-buying").value);
    const sellingRate = parseFloat(document.getElementById("e-selling").value);
    const decimals    = parseInt(document.getElementById("e-decimals").value);
    if (isNaN(buyingRate) || isNaN(sellingRate)) { showError("Please fill in all fields."); return; }
    try {
        const res = await fetch(`/api/currencies/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ currency, unit, buyingRate, sellingRate, decimals })
        });
        if (!res.ok) { const d = await res.json(); showError(d.error || "Failed"); return; }
        editingId = null; loadCurrencies();
    } catch { showError("Could not save. Please try again."); }
}

async function toggleCurrency(id) {
    try {
        const res = await fetch(`/api/currencies/${id}/toggle`, { method: "POST", credentials: "include" });
        if (!res.ok) throw new Error();
        loadCurrencies();
    } catch { showError("Could not toggle."); }
}

async function deleteCurrency(id) {
    if (!confirm("Delete this currency?")) return;
    try {
        const res = await fetch(`/api/currencies/${id}`, { method: "DELETE", credentials: "include" });
        if (!res.ok) throw new Error();
        loadCurrencies();
    } catch { showError("Could not delete."); }
}

loadCurrencies();
</script>
</body>
</html>
