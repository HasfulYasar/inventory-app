<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <div class="card">
        <h2>Login</h2>
        <form id="loginForm" onsubmit="login(event)">
            <input class="input" type="text" id="username" placeholder="Username" required>
            <input class="input" type="password" id="password" placeholder="Password" required>
            <button class="btn btn-primary full-width" type="submit">Login</button>
            <div id="error-msg" class="error-msg" style="display:none;"></div>
        </form>
        <p class="auth-link">No account? <a href="/signup">Sign up</a></p>
    </div>
</div>

<script>
async function login(e) {
    e.preventDefault();
    const errorEl = document.getElementById("error-msg");
    errorEl.style.display = "none";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
        const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
            window.location.href = "/";
        } else {
            errorEl.textContent = data.error || "Login failed";
            errorEl.style.display = "block";
        }
    } catch (err) {
        errorEl.textContent = "Could not reach server. Please try again.";
        errorEl.style.display = "block";
    }
}
</script>

</body>
</html>
