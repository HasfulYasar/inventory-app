<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — SHOWCASH</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .account-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        .account-sidebar {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e4ee;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .sidebar-avatar {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            padding: 2rem 1rem;
            text-align: center;
        }
        .avatar-circle {
            width: 72px; height: 72px;
            background: #f0c040;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900;
            color: #1a1a2e;
            margin: 0 auto 0.75rem;
        }
        .sidebar-username { font-size: 15px; font-weight: 700; color: #fff; }
        .sidebar-email { font-size: 12px; color: #aab0c6; margin-top: 3px; }
        .sidebar-nav { padding: 0.5rem 0; }
        .sidebar-nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 1.2rem; font-size: 14px; font-weight: 500;
            color: #555; cursor: pointer; transition: background 0.15s, color 0.15s;
            border: none; background: none; width: 100%; text-align: left;
        }
        .sidebar-nav-item:hover { background: #f5f6fa; color: #1a1a2e; }
        .sidebar-nav-item.active { background: rgba(240,192,64,0.1); color: #b8860b; font-weight: 700; border-left: 3px solid #f0c040; }
        .sidebar-nav-item .icon { font-size: 16px; }

        .account-panels { }
        .panel { display: none; }
        .panel.active { display: block; }

        .panel-title { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.25rem; }
        .panel-subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

        .form-actions { display: flex; gap: 10px; margin-top: 1.2rem; }
        .divider { height: 1px; background: #f0f1f6; margin: 1.2rem 0; }

        .danger-zone {
            border: 1px solid #f5c6c2;
            border-radius: 10px;
            padding: 1.2rem 1.4rem;
            background: #fdf2f2;
        }
        .danger-zone h4 { font-size: 14px; font-weight: 700; color: #c0392b; margin-bottom: 6px; }
        .danger-zone p { font-size: 13px; color: #888; margin-bottom: 1rem; }

        .msg-success { font-size: 13px; color: #1a7f4b; background: #edfaf3; border: 1px solid #a8e6c5; border-radius: 7px; padding: 8px 12px; margin-top: 10px; display: none; }
        .msg-error   { font-size: 13px; color: #c0392b; background: #fdf2f2; border: 1px solid #f5c6c2; border-radius: 7px; padding: 8px 12px; margin-top: 10px; display: none; }

        @media (max-width: 680px) {
            .account-grid { grid-template-columns: 1fr; }
            .sidebar-nav { display: flex; flex-wrap: wrap; }
            .sidebar-nav-item { flex: 1; justify-content: center; min-width: 100px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-header-text">
            <h2>Account Settings</h2>
            <p>Manage your profile, email and password</p>
        </div>
    </div>

    <div class="account-grid">
        <!-- Sidebar -->
        <div class="account-sidebar">
            <div class="sidebar-avatar">
                <div class="avatar-circle" id="avatarInitial">?</div>
                <div class="sidebar-username" id="sidebarUsername">Loading...</div>
                <div class="sidebar-email" id="sidebarEmail"></div>
            </div>
            <div class="sidebar-nav">
                <button class="sidebar-nav-item active" onclick="showPanel('profile', this)">
                    <span class="icon">👤</span> Profile
                </button>
                <button class="sidebar-nav-item" onclick="showPanel('password', this)">
                    <span class="icon">🔒</span> Password
                </button>
            </div>
        </div>

        <!-- Panels -->
        <div class="account-panels">

            <!-- Profile Panel -->
            <div class="panel active card" id="panel-profile">
                <div class="panel-title">Profile Information</div>
                <div class="panel-subtitle">Update your display name and email address</div>

                <div class="field">
                    <label class="field-label">Username</label>
                    <input class="input" type="text" id="prof-username" disabled style="background:#f5f6fa;color:#999;cursor:not-allowed;">
                    <div style="font-size:11px;color:#aaa;margin-top:2px;">Username cannot be changed</div>
                </div>

                <div class="field">
                    <label class="field-label">Display Name</label>
                    <input class="input" type="text" id="prof-displayname" placeholder="e.g. John Smith">
                </div>

                <div class="field">
                    <label class="field-label">Email Address</label>
                    <input class="input" type="email" id="prof-email" placeholder="e.g. john@example.com">
                </div>

                <div class="form-actions">
                    <button class="btn btn-gold" onclick="saveProfile()">Save Changes</button>
                </div>
                <div class="msg-success" id="prof-success"></div>
                <div class="msg-error"   id="prof-error"></div>
            </div>

            <!-- Password Panel -->
            <div class="panel card" id="panel-password">
                <div class="panel-title">Change Password</div>
                <div class="panel-subtitle">Choose a strong password with at least 6 characters</div>

                <div class="field">
                    <label class="field-label">Current Password</label>
                    <input class="input" type="password" id="pw-current" placeholder="Enter current password">
                </div>

                <div class="divider"></div>

                <div class="field">
                    <label class="field-label">New Password</label>
                    <input class="input" type="password" id="pw-new" placeholder="At least 6 characters">
                </div>

                <div class="field">
                    <label class="field-label">Confirm New Password</label>
                    <input class="input" type="password" id="pw-confirm" placeholder="Repeat new password">
                </div>

                <div class="form-actions">
                    <button class="btn btn-gold" onclick="changePassword()">Update Password</button>
                    <button class="btn btn-secondary" onclick="clearPasswordFields()">Clear</button>
                </div>
                <div class="msg-success" id="pw-success"></div>
                <div class="msg-error"   id="pw-error"></div>
            </div>

        </div>
    </div>
</div>

<script src="navbar.js"></script>
<script>
function showPanel(name, btn) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".sidebar-nav-item").forEach(b => b.classList.remove("active"));
    document.getElementById("panel-" + name).classList.add("active");
    btn.classList.add("active");
}

function showMsg(id, msg, isError) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(() => { el.style.display = "none"; }, 4000);
}

// Load current user data
async function loadProfile() {
    try {
        const res = await fetch("/api/me", { credentials: "include" });
        if (!res.ok) { window.location.href = "/login"; return; }
        const data = await res.json();

        document.getElementById("prof-username").value    = data.username || "";
        document.getElementById("prof-displayname").value = data.displayName || "";
        document.getElementById("prof-email").value       = data.email || "";

        // Sidebar
        const name = data.displayName || data.username;
        document.getElementById("sidebarUsername").textContent = name;
        document.getElementById("sidebarEmail").textContent    = data.email || "No email set";
        document.getElementById("avatarInitial").textContent   = name.charAt(0).toUpperCase();
    } catch {
        window.location.href = "/login";
    }
}

async function saveProfile() {
    const displayName = document.getElementById("prof-displayname").value.trim();
    const email       = document.getElementById("prof-email").value.trim();

    try {
        const res = await fetch("/api/account/profile", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ displayName, email })
        });
        const data = await res.json();
        if (res.ok) {
            showMsg("prof-success", "✓ Profile updated successfully", false);
            loadProfile();
        } else {
            showMsg("prof-error", data.error || "Failed to update", true);
        }
    } catch {
        showMsg("prof-error", "Could not reach server. Please try again.", true);
    }
}

async function changePassword() {
    const currentPassword = document.getElementById("pw-current").value.trim();
    const newPassword     = document.getElementById("pw-new").value.trim();
    const confirmPassword = document.getElementById("pw-confirm").value.trim();

    try {
        const res = await fetch("/api/account/password", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ currentPassword, newPassword, confirmPassword })
        });
        const data = await res.json();
        if (res.ok) {
            showMsg("pw-success", "✓ Password changed successfully", false);
            clearPasswordFields();
        } else {
            showMsg("pw-error", data.error || "Failed to change password", true);
        }
    } catch {
        showMsg("pw-error", "Could not reach server. Please try again.", true);
    }
}

function clearPasswordFields() {
    document.getElementById("pw-current").value = "";
    document.getElementById("pw-new").value = "";
    document.getElementById("pw-confirm").value = "";
}

loadProfile();
</script>
</body>
</html>
