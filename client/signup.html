<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SHOWCASH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <img src="/logo.png" alt="SHOWCASH" class="auth-logo">
        <div class="auth-card">
            <h2>Create your account</h2>
            <form onsubmit="signup(event)">
                <input class="input" type="text" id="username" placeholder="Username" required>
                <input class="input" type="password" id="password" placeholder="Password (min 6 chars)" required minlength="6">
                <div id="error-msg" class="error-msg" style="display:none;"></div>
                <button class="btn-gold-full" type="submit">Sign Up</button>
            </form>
            <p class="auth-link">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>
</div>
<script>
async function signup(e) {
    e.preventDefault();
    const errorEl = document.getElementById("error-msg");
    errorEl.style.display = "none";
    try {
        const res = await fetch("/api/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value.trim()
            })
        });
        const data = await res.json();
        if (res.ok) { window.location.href = "/login"; }
        else { errorEl.textContent = data.error || "Signup failed"; errorEl.style.display = "block"; }
    } catch {
        errorEl.textContent = "Could not reach server. Please try again.";
        errorEl.style.display = "block";
    }
}
</script>
</body>
</html>
