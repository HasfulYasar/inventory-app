<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Currency — SHOWCASH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-header-text">
            <h2>Add Currency</h2>
            <p>Add a new currency exchange rate</p>
        </div>
        <a href="/" class="btn btn-secondary">← Home</a>
    </div>

    <div class="card" style="max-width:500px;">
        <div id="error-msg" class="error-msg" style="display:none;"></div>
        <div id="success-msg" class="success-msg"></div>

        <form id="currencyForm" onsubmit="addCurrency(event)">
            <div class="field">
                <label class="field-label">Currency</label>
                <select id="currency" class="input"></select>
            </div>
            <div class="field">
                <label class="field-label">Unit <span style="color:#999;font-weight:400;">(e.g. 1, 10, 100)</span></label>
                <input class="input" type="number" id="unit" placeholder="e.g. 1" min="1" step="1" value="1" required
                    onkeypress="return event.charCode>=48&&event.charCode<=57"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
            <div class="field">
                <label class="field-label">Buying Rate</label>
                <input class="input" type="number" id="buyingRate" placeholder="e.g. 83.50" step="any" min="0" required>
            </div>
            <div class="field">
                <label class="field-label">Selling Rate</label>
                <input class="input" type="number" id="sellingRate" placeholder="e.g. 84.20" step="any" min="0" required>
            </div>
            <div class="field">
                <label class="field-label">Decimal Places</label>
                <select id="decimals" class="input">
                    <option value="0">0 — e.g. 84</option>
                    <option value="1">1 — e.g. 84.2</option>
                    <option value="2" selected>2 — e.g. 84.20</option>
                    <option value="3">3 — e.g. 84.200</option>
                    <option value="4">4 — e.g. 84.2000</option>
                </select>
            </div>
            <button class="btn btn-gold full-width" type="submit">Add Currency</button>
        </form>
    </div>
</div>

<script src="navbar.js"></script>
<script>
// Full currency list with correct country codes for flags
const CURRENCIES = [
    { code: "USD", name: "US Dollar",            cc: "us" },
    { code: "GBP", name: "British Pound",         cc: "gb" },
    { code: "JPY", name: "Japanese Yen",          cc: "jp" },
    { code: "EUR", name: "Euro",                  cc: "eu" },
    { code: "AUD", name: "Australian Dollar",     cc: "au" },
    { code: "SGD", name: "Singapore Dollar",      cc: "sg" },
    { code: "HKD", name: "Hong Kong Dollar",      cc: "hk" },
    { code: "CAD", name: "Canadian Dollar",       cc: "ca" },
    { code: "CHF", name: "Swiss Franc",           cc: "ch" },
    { code: "NZD", name: "New Zealand Dollar",    cc: "nz" },
    { code: "TWD", name: "Taiwan Dollar",         cc: "tw" },
    { code: "KRW", name: "South Korean Won",      cc: "kr" },
    { code: "INR", name: "Indian Rupee",          cc: "in" },
    { code: "DKK", name: "Danish Krone",          cc: "dk" },
    { code: "SEK", name: "Swedish Krona",         cc: "se" },
    { code: "NOK", name: "Norwegian Krone",       cc: "no" },
    { code: "ZAR", name: "South African Rand",    cc: "za" },
    { code: "THB", name: "Thai Baht",             cc: "th" },
    { code: "CNY", name: "Chinese Yuan",          cc: "cn" },
    { code: "IDR", name: "Indonesian Rupiah",     cc: "id" },
    { code: "SAR", name: "Saudi Riyal",           cc: "sa" },
    { code: "MYR", name: "Malaysian Ringgit",     cc: "my" },
    { code: "PHP", name: "Philippine Peso",       cc: "ph" },
    { code: "PKR", name: "Pakistani Rupee",       cc: "pk" },
    { code: "VND", name: "Vietnamese Dong",       cc: "vn" },
    { code: "OMR", name: "Omani Rial",            cc: "om" },
    { code: "JOD", name: "Jordanian Dinar",       cc: "jo" },
    { code: "AED", name: "UAE Dirham",            cc: "ae" },
    { code: "BHD", name: "Bahraini Dinar",        cc: "bh" },
    { code: "BND", name: "Brunei Dollar",         cc: "bn" },
    { code: "EGP", name: "Egyptian Pound",        cc: "eg" },
    { code: "QAR", name: "Qatari Riyal",          cc: "qa" },
    { code: "KWD", name: "Kuwaiti Dinar",         cc: "kw" },
    { code: "LKR", name: "Sri Lankan Rupee",      cc: "lk" },
    { code: "BDT", name: "Bangladeshi Taka",      cc: "bd" },
    { code: "MOP", name: "Macanese Pataca",       cc: "mo" },
    { code: "SCR", name: "Seychellois Rupee",     cc: "sc" },
    { code: "IQD", name: "Iraqi Dinar",           cc: "iq" },
    { code: "TRY", name: "Turkish Lira",          cc: "tr" },
    { code: "RUB", name: "Russian Ruble",         cc: "ru" },
];

// Populate dropdown with flag images
const select = document.getElementById("currency");
CURRENCIES.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.code;
    opt.textContent = `${c.code} — ${c.name}`;
    select.appendChild(opt);
});

async function addCurrency(e) {
    e.preventDefault();
    const errorEl   = document.getElementById("error-msg");
    const successEl = document.getElementById("success-msg");
    errorEl.style.display   = "none";
    successEl.style.display = "none";

    const payload = {
        currency:    document.getElementById("currency").value,
        unit:        parseInt(document.getElementById("unit").value) || 1,
        buyingRate:  parseFloat(document.getElementById("buyingRate").value),
        sellingRate: parseFloat(document.getElementById("sellingRate").value),
        decimals:    parseInt(document.getElementById("decimals").value)
    };

    try {
        const res = await fetch("/api/currencies", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
            successEl.textContent   = `${payload.currency} added successfully!`;
            successEl.style.display = "block";
            document.getElementById("currencyForm").reset();
            document.getElementById("unit").value = "1";
        } else {
            errorEl.textContent   = data.error || "Failed to add currency";
            errorEl.style.display = "block";
        }
    } catch {
        errorEl.textContent   = "Could not reach server. Please try again.";
        errorEl.style.display = "block";
    }
}
</script>
</body>
</html>
