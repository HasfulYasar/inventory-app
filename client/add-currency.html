<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Currency — SHOWCASH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="page-header-text">
            <h2>Add Currency</h2>
            <p>Add a new currency exchange rate</p>
        </div>
        <a href="/" class="btn btn-secondary">← Dashboard</a>
    </div>

    <div class="card" style="max-width:500px;">
        <div id="error-msg" class="error-msg" style="display:none;"></div>
        <div id="success-msg" class="success-msg"></div>

        <form id="currencyForm" onsubmit="addCurrency(event)">
            <div class="field">
                <label class="field-label">Currency</label>
                <select id="currency" class="input">
                    <option value="USD">USD — US Dollar</option>
                    <option value="EUR">EUR — Euro</option>
                    <option value="GBP">GBP — British Pound</option>
                    <option value="JPY">JPY — Japanese Yen</option>
                    <option value="AED">AED — UAE Dirham</option>
                    <option value="SGD">SGD — Singapore Dollar</option>
                    <option value="AUD">AUD — Australian Dollar</option>
                    <option value="CAD">CAD — Canadian Dollar</option>
                    <option value="CHF">CHF — Swiss Franc</option>
                    <option value="INR">INR — Indian Rupee</option>
                    <option value="SAR">SAR — Saudi Riyal</option>
                    <option value="KWD">KWD — Kuwaiti Dinar</option>
                    <option value="BHD">BHD — Bahraini Dinar</option>
                    <option value="QAR">QAR — Qatari Riyal</option>
                    <option value="OMR">OMR — Omani Rial</option>
                    <option value="MYR">MYR — Malaysian Ringgit</option>
                    <option value="HKD">HKD — Hong Kong Dollar</option>
                    <option value="CNY">CNY — Chinese Yuan</option>
                </select>
            </div>
            <div class="field">
                <label class="field-label">Buying Rate</label>
                <input class="input" type="number" id="buyingRate" placeholder="e.g. 83.50" step="any" min="0" required>
            </div>
            <div class="field">
                <label class="field-label">Selling Rate</label>
                <input class="input" type="number" id="sellingRate" placeholder="e.g. 84.20" step="any" min="0" required>
            </div>
            <div class="field">
                <label class="field-label">Decimal Places</label>
                <select id="decimals" class="input">
                    <option value="0">0 — e.g. 84</option>
                    <option value="1">1 — e.g. 84.2</option>
                    <option value="2" selected>2 — e.g. 84.20</option>
                    <option value="3">3 — e.g. 84.200</option>
                    <option value="4">4 — e.g. 84.2000</option>
                </select>
            </div>
            <div style="display:flex;gap:8px;margin-top:6px;">
                <button class="btn btn-gold full-width" type="submit">Add Currency</button>
            </div>
        </form>
    </div>
</div>

<script src="navbar.js"></script>
<script>
async function addCurrency(e) {
    e.preventDefault();
    const errorEl = document.getElementById("error-msg");
    const successEl = document.getElementById("success-msg");
    errorEl.style.display = "none";
    successEl.style.display = "none";

    const payload = {
        currency: document.getElementById("currency").value,
        buyingRate: parseFloat(document.getElementById("buyingRate").value),
        sellingRate: parseFloat(document.getElementById("sellingRate").value),
        decimals: parseInt(document.getElementById("decimals").value)
    };

    try {
        const res = await fetch("/api/currencies", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
            successEl.textContent = `${payload.currency} added successfully!`;
            successEl.style.display = "block";
            document.getElementById("currencyForm").reset();
        } else {
            errorEl.textContent = data.error || "Failed to add currency";
            errorEl.style.display = "block";
        }
    } catch {
        errorEl.textContent = "Could not reach server. Please try again.";
        errorEl.style.display = "block";
    }
}
</script>
</body>
</html>
