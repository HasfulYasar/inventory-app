<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Currency — Inventory App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="page-header">
        <h2>Add Currency</h2>
        <p>Enter the exchange rate details for a currency</p>
    </div>

    <div class="card" style="max-width: 480px;">
        <div id="error-msg" class="error-msg" style="display:none;"></div>
        <div id="success-msg" class="success-msg"></div>

        <form id="currencyForm" onsubmit="addCurrency(event)">
            <div class="field">
                <label class="field-label" for="currency">Currency</label>
                <select id="currency" class="input">
                    <option value="USD">USD — US Dollar</option>
                    <option value="EUR">EUR — Euro</option>
                    <option value="GBP">GBP — British Pound</option>
                    <option value="JPY">JPY — Japanese Yen</option>
                    <option value="AED">AED — UAE Dirham</option>
                    <option value="SGD">SGD — Singapore Dollar</option>
                    <option value="AUD">AUD — Australian Dollar</option>
                    <option value="CAD">CAD — Canadian Dollar</option>
                    <option value="CHF">CHF — Swiss Franc</option>
                    <option value="INR">INR — Indian Rupee</option>
                </select>
            </div>
            <div class="field">
                <label class="field-label" for="buyingRate">Buying Rate</label>
                <input class="input" type="number" id="buyingRate" placeholder="e.g. 83.50" step="0.01" min="0" required>
            </div>
            <div class="field">
                <label class="field-label" for="sellingRate">Selling Rate</label>
                <input class="input" type="number" id="sellingRate" placeholder="e.g. 84.20" step="0.01" min="0" required>
            </div>
            <div class="field">
                <label class="field-label" for="quantity">Quantity</label>
                <input class="input" type="number" id="quantity" placeholder="e.g. 1000" min="1" required>
            </div>
            <div style="display:flex; gap:8px; margin-top:4px;">
                <button class="btn btn-secondary" type="button" onclick="window.location.href='/currency-list'">View List</button>
                <button class="btn btn-primary" type="submit">Add Currency</button>
            </div>
        </form>
    </div>
</div>

<script src="navbar.js"></script>
<script>
async function addCurrency(e) {
    e.preventDefault();
    const errorEl = document.getElementById("error-msg");
    const successEl = document.getElementById("success-msg");
    errorEl.style.display = "none";
    successEl.style.display = "none";

    const payload = {
        currency: document.getElementById("currency").value,
        buyingRate: Number(document.getElementById("buyingRate").value),
        sellingRate: Number(document.getElementById("sellingRate").value),
        quantity: Number(document.getElementById("quantity").value)
    };

    try {
        const res = await fetch("/api/currencies", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
            successEl.textContent = "Currency added successfully!";
            successEl.style.display = "block";
            document.getElementById("currencyForm").reset();
        } else {
            errorEl.textContent = data.error || "Failed to add currency";
            errorEl.style.display = "block";
        }
    } catch {
        errorEl.textContent = "Could not reach server. Please try again.";
        errorEl.style.display = "block";
    }
}
</script>
</body>
</html>
