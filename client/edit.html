<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
</head>
<body>

<h2>Edit Product</h2>

<form id="editForm">

    <select id="currency">
        <option value="INR">INR</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
    </select><br><br>

    <input type="number" id="buyingRate" placeholder="Buying Rate" required><br><br>
    <input type="number" id="sellingRate" placeholder="Selling Rate" required><br><br>
    <input type="number" id="quantity" placeholder="Quantity" required><br><br>

    <button type="submit">Save</button>

</form>

<script src="edit.js"></script>

</body>
</html>
