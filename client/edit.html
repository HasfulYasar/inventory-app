<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card" style="max-width: 480px; margin: 2rem auto;">
        <h2>Edit Product</h2>
        <div id="error-msg" class="error-msg" style="display:none;"></div>
        <form id="editForm" onsubmit="saveProduct(event)">
            <select id="currency" class="input">
                <option value="INR">INR</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>
            <input class="input" type="number" id="buyingRate" placeholder="Buying Rate" step="0.01" required>
            <input class="input" type="number" id="sellingRate" placeholder="Selling Rate" step="0.01" required>
            <input class="input" type="number" id="quantity" placeholder="Quantity" required>
            <div class="form-row">
                <button class="btn btn-secondary" type="button" onclick="window.location.href='/'">Cancel</button>
                <button class="btn btn-primary" type="submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script src="edit.js"></script>
</body>
</html>
